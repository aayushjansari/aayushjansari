name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: aayushjansari 
          template: classic
          
          # --- THE MAGIC FIX FOR ORG DATA ---
          # This forces GitHub to include org repos in your total counts
          repositories_affiliations: owner, collaborator, organization_member
          
          # --- MAKE IT PRETTIER ---
          # Applies a sleek, modern dark theme (other options: dracula, nord, radical)
          config_theme: tokyonight
          config_timezone: Asia/Kolkata
          
          # BASE
          base: header, metadata
          
          # LINES OF CODE
          plugin_lines: yes
          plugin_lines_sections: base
          # Bumped this up to ensure it scans enough repos to catch your org work
          plugin_lines_repositories_limit: 100 

          # LANGUAGES
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used 
          plugin_languages_details: percentage, lines

          # PRs & REVIEWS
          plugin_followup: yes
          plugin_followup_indepth: no
